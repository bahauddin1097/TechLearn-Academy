{% extends 'home.html' %}
{% load crispy_forms_tags %}

{% block title %}TechLearn Academy - Add Student{% endblock %}

{% block content %}
<div class="container pt-4 px-4">
    <h2>Add Student</h2>

    <form action="{% url 'add_student' %}" method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <button class="btn btn-primary" type="submit">Add</button>
    </form>
</div>
{% endblock %}
