{% extends 'home.html' %}
{% load crispy_forms_tags %}

{% block title %}TechLearn Academy - Login{% endblock %}

{% block content %}
<div class="container pt-5 px-5">
    <h2>Log in</h2>

    <form action="{% url 'login' %}" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-success" type="submit">Log in</button>
    </form>
</div>
{% endblock %}
