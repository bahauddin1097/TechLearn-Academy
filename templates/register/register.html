{% extends 'home.html' %}
{% load crispy_forms_tags %}

{% block title %}TechLearn Academy - Register{% endblock %}

{% block content %}
<div class="container pt-5 px-5">
    <h2>Sign up</h2>

    <form action="{% url 'register' %}" method="post">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-primary" type="submit">Register</button>
    </form>
</div>
{% endblock %}
