{% extends 'home.html' %}
{% load crispy_forms_tags %}

{% block title %}TechLearn Academy - Delete Trainer{% endblock %}

{% block content %}
<div class="container pt-4 px-4">
    <h2>Delete trainer</h2>
    <h5>Are you sure you want to delete?</h5>

    <form action="{% url 'delete_trainer' trainer.id %}" method="post" class="pt-3" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form|crispy }}
        <button class="btn btn-danger" type="submit">Yes, delete</button>
    </form>
</div>
{% endblock %}
